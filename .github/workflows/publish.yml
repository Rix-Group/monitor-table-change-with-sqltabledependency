name: Deploy SqlTableDependency NuGet Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    env:
      PROJECT_PATH: 'TableDependency.SqlClient/TableDependency.SqlClient.csproj'

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v6

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: ⚙️ Restore Dependencies
        run: |
          dotnet restore ${{ env.PROJECT_PATH }}

      - name: 🧱 Build
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --framework net10.0

      - name: 📦 Build and Pack NuGet
        id: pack
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output nupkg

      - name: ⬆️ Publish to NuGet
        run: |
          DOTNET_SOURCE=https://api.nuget.org/v3/index.json
          PACKAGE_PATH=$(find ./nupkg -name "Rix.SqlTableDependency*.nupkg" | head -n 1)

          echo "Pushing package: ${PACKAGE_PATH} to ${DOTNET_SOURCE}"

          dotnet nuget push $PACKAGE_PATH \
            --source $DOTNET_SOURCE \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate